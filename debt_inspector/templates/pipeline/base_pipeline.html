{% extends "base.html" %}
{% block content %}

<!-- Progress bar -->
<div class="card" style="padding: 1rem 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; position: relative;">
        <!-- Линия -->
        <div style="position: absolute; top: 18px; left: 40px; right: 40px; height: 3px; background: #e2e8f0; z-index: 0;"></div>
        <div style="position: absolute; top: 18px; left: 40px; height: 3px; background: #3b82f6; z-index: 1;
             width: {{ ((current_step_num - 1) / 7 * 100)|int }}%;"></div>

        {% for step in steps %}
        <div style="text-align: center; z-index: 2; flex: 1;">
            <div style="width: 36px; height: 36px; border-radius: 50%; margin: 0 auto;
                 display: flex; align-items: center; justify-content: center;
                 font-weight: 700; font-size: .85rem;
                 {% if step.num < current_step_num %}
                     background: #3b82f6; color: #fff;
                 {% elif step.num == current_step_num %}
                     background: #3b82f6; color: #fff; box-shadow: 0 0 0 4px rgba(59,130,246,.25);
                 {% else %}
                     background: #e2e8f0; color: #94a3b8;
                 {% endif %}
                 ">
                {% if step.num < current_step_num %}
                    &#10003;
                {% else %}
                    {{ step.num }}
                {% endif %}
            </div>
            <div style="font-size: .7rem; margin-top: .4rem; color: {% if step.num <= current_step_num %}#334155{% else %}#94a3b8{% endif %}; font-weight: {% if step.num == current_step_num %}700{% else %}400{% endif %};">
                {{ step.label }}
            </div>
        </div>
        {% endfor %}
    </div>
</div>

{% block pipeline_content %}{% endblock %}

{% endblock %}
