{% extends "base.html" %}
{% block title %}Поиск — Debt Inspector{% endblock %}
{% block content %}
<div class="card">
    <h1>Проверка должника</h1>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('person')">Физическое лицо</button>
        <button class="tab" onclick="switchTab('company')">Юридическое лицо</button>
    </div>

    <form method="POST" action="/search" id="searchForm" onsubmit="showLoading()">
        <input type="hidden" name="subject_type" id="subject_type" value="person">

        <!-- Физлицо -->
        <div class="tab-content active" id="tab-person">
            <div class="form-row-3">
                <div class="form-group">
                    <label for="last_name">Фамилия *</label>
                    <input type="text" id="last_name" name="last_name" placeholder="Иванов">
                </div>
                <div class="form-group">
                    <label for="first_name">Имя</label>
                    <input type="text" id="first_name" name="first_name" placeholder="Иван">
                </div>
                <div class="form-group">
                    <label for="middle_name">Отчество</label>
                    <input type="text" id="middle_name" name="middle_name" placeholder="Иванович">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="birth_date">Дата рождения</label>
                    <input type="date" id="birth_date" name="birth_date">
                </div>
                <div class="form-group">
                    <label for="inn_person">ИНН</label>
                    <input type="text" id="inn_person" name="inn" maxlength="12" placeholder="123456789012">
                </div>
            </div>
        </div>

        <!-- Юрлицо -->
        <div class="tab-content" id="tab-company">
            <div class="form-group">
                <label for="company_name">Наименование организации</label>
                <input type="text" id="company_name" name="company_name" placeholder='ООО "Рога и Копыта"'>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="inn_company">ИНН</label>
                    <input type="text" id="inn_company" name="inn_company" maxlength="10" placeholder="7707083893">
                </div>
                <div class="form-group">
                    <label for="ogrn">ОГРН</label>
                    <input type="text" id="ogrn" name="ogrn" maxlength="13" placeholder="1027700132195">
                </div>
            </div>
        </div>

        <!-- Регион (общий) -->
        <div class="form-group">
            <label for="region">Регион</label>
            <select id="region" name="region">
                <option value="">Все регионы</option>
                {% for code, name in regions.items() %}
                    <option value="{{ code }}">{{ code }} — {{ name }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
            <span class="btn-text">Проверить</span>
            <span class="spinner"></span>
        </button>
    </form>
</div>

<script>
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('subject_type').value = tab;
    event.target.classList.add('active');
}
function showLoading() {
    document.getElementById('submitBtn').classList.add('loading');
}
</script>
{% endblock %}
